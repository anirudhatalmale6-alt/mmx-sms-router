name = "mmx-sms-router"
main = "src/index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# D1 database binding - stores customers, routing rules, DR rules, retry
# policies and the delivery log. Create with:
#   wrangler d1 create mmx_router
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "mmx_router"
database_id = "REPLACE_WITH_DATABASE_ID"

# Scheduled trigger drives the retry engine. Every minute it scans the
# delivery log for due retries and re-attempts them per the customer's
# retry policy. Free on Cloudflare's Workers plan.
[triggers]
crons = ["* * * * *"]

[vars]
# Shared secret required in the X-Admin-Token header for all /admin API
# calls. Override in production with:  wrangler secret put ADMIN_TOKEN
ADMIN_TOKEN = "dev-admin-token-change-me"
