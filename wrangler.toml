name = "mmx-sms-router"
main = "src/index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# D1 database binding - stores customers, routing rules, DR rules, retry
# policies and the delivery log. Create with:
#   wrangler d1 create mmx_router
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "mmx_router"
database_id = "1c131578-c85b-49d4-817e-83f302dfd6ff"

# Scheduled trigger drives the retry engine. Every minute it scans the
# delivery log for due retries and re-attempts them per the customer's
# retry policy. Free on Cloudflare's Workers plan.
[triggers]
crons = ["* * * * *"]

# ADMIN_TOKEN is provided as an encrypted secret (wrangler secret put ADMIN_TOKEN),
# not a plaintext var, so the admin dashboard/API token never lives in the repo.
# For local dev, wrangler reads it from a .dev.vars file (gitignored).
